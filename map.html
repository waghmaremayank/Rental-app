<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Nearby Rentals - Nagpur | GearShare</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: max(884px, 100dvh);
        }

        .glass-active {
            background: rgba(19, 127, 236, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(19, 127, 236, 0.2);
        }

        .map-marker {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        /* No-scrollbar utility */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Marker bounce */
        @keyframes markerBounce {

            0%,
            100% {
                transform: translate(-50%, -50%) translateY(0);
            }

            50% {
                transform: translate(-50%, -50%) translateY(-6px);
            }
        }

        .marker-bounce {
            animation: markerBounce 1.4s ease-in-out infinite;
        }

        /* Micro-animations */
        .btn-active:active {
            transform: scale(0.94);
        }

        button,
        a {
            transition: opacity 0.15s ease;
        }

        button:hover {
            opacity: 0.88;
        }

        /* Bottom sheet slide in */
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .slide-up {
            animation: slideUp 0.35s cubic-bezier(.16, 1, .3, 1);
        }
    </style>
</head>

<body
