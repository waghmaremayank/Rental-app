<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign Up | Go Rental</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <header
            class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
            <a href="login.html"
                class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h2
                class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">
                Create Account</h2>
            <div class="size-12"></div>
        </header>
        <main class="flex-1 px-4 pb-24">
            <div class="@container max-w-xl mx-auto">
                <div class="py-3">
                    <div class="bg-cover bg-center flex flex-col justify-end overflow-hidden rounded-xl min-h-[180px] relative group"
                        data-alt="Luxury car driving through modern city street"
                        style='background-image: linear-gradient(0deg, rgba(19, 127, 236, 0.6) 0%, rgba(19, 127, 236, 0) 100%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuBeKrYiVPssdeChEib2tiR_uSlkQFptItQTn2V7_OHTqp6YjZpmYXrXYwqVLwPKgVGOKREujhkw02x11w_nwuEwSgNWqNQFSAeBD8BIwAgl_RfWpQ950FXCW5eyVNJcVeESOQPNVz3yWi6In-PTAiPOpVwUriCPdkjOP-GgWRjuminqn0GUAqO-amINNEWqhL27Dwmn7yOtfc6bYhukF5h6E5Pv7A9VqDI5BDfh47Ci9RpNG391wWpGWz78BqV4naTVDu235CgzFw");'>
                        <div class="flex p-6">
                            <div>
                                <p class="text-white tracking-tight text-[32px] font-extrabold leading-tight">Go Rental
                                </p>
                                <p class="text-white/90 text-sm font-medium">Premium Mobility in Nagpur</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="pt-4 pb-6">
                    <h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight">Join
                        the Premium Club</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-base font-normal mt-1">Experience seamless rentals
                        in Nagpur, India.</p>
                </div>
                <form action="index.html" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Full
                            Name</label>
                        <input required
                            class="w-full bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                            placeholder="Enter your full name" type="text" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Email
                            Address</label>
                        <input required
                            class="w-full bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                            placeholder="name@example.com" type="email" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Phone
                            Number</label>
                        <div class="flex gap-2">
                            <div
                                class="flex items-center gap-2 px-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shrink-0">
                                <span class="text-lg">🇮🇳</span>
                                <span class="text-sm font-medium text-slate-600 dark:text-slate-400">+91</span>
                            </div>
                            <input
                                class="flex-1 bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                                placeholder="98765 43210" type="tel" />
                        </div>
                    </div>
                    <div class="grid grid-cols-1 @[400px]:grid-cols-2 gap-4">
                        <div>
                            <label
                                class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Password</label>
                            <input required
                                class="w-full bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                                placeholder="••••••••" type="password" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Confirm
                                Password</label>
                            <input required
                                class="w-full bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                                placeholder="••••••••" type="password" />
                        </div>
                    </div>
                    <button onclick="localStorage.setItem('isLoggedIn', 'true'); window.location.href='index.html'"
                        class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all mt-4"
                        type="button">
                        Create My Account
                    </button>
                </form>
                <div class="relative py-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="bg-background-light dark:bg-background-dark px-4 text-slate-500">Or sign up
                            with</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <button
                        class="flex items-center justify-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg py-3 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
                        <img alt="Google Logo" class="size-5" data-alt="Google logo icon"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfQtgpgL_hwPSqNawjA-IQNBcgzmy6V0D5loKQlcP_cIsi8FpGlXFV3J3tSY0zPV-zO31N_Yd6Q0hDWBsGiiYbGXj8Y5UHpC3axSpHJ1iX5ZPaYqjlPc5vAaoG0X5Gdy0TA5K1rk6H9oipFJe28fuf__bXDa5WwC58QnKRCqVl--fXpxq2HFaMHav77iyCPirBiHK-qc-poV3-bneamm-wzrBZ1CdgNk1R24_lTN2pWP3FgPgfLFnXcbfiq7qE_OCMx8aeHxCWGQ" />
                        <span class="text-sm font-semibold">Google</span>
                    </button>
                    <button
                        class="flex items-center justify-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg py-3 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
                        <span class="material-symbols-outlined text-xl">ios</span>
                        <span class="text-sm font-semibold">Apple</span>
                    </button>
                </div>
                <p class="text-center text-slate-500 text-sm">
                    Already have an account? <a class="text-primary font-bold hover:underline" href="login.html">Sign
                        In</a>
                </p>
            </div>
        </main>
        <nav
            class="fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl px-4 pb-6 pt-2 z-20">
            <div class="flex gap-2 max-w-md mx-auto">
                <a class="flex flex-1 flex-col items-center justify-end gap-1 group" href="index.html">
                    <div
                        class="relative flex h-10 w-10 items-center justify-center rounded-xl bg-primary/10 text-primary transition-all">
                        <div
                            class="absolute inset-0 rounded-xl bg-primary/20 blur-[4px] opacity-50 group-hover:opacity-100 transition-opacity">
                        </div>
                        <span class="material-symbols-outlined relative z-10 font-variation-fill">home</span>
                    </div>
                    <p class="text-primary text-[10px] font-bold leading-normal tracking-wide">HOME</p>
                </a>
                <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500"
                    href="map.html">
                    <div class="flex h-10 items-center justify-center">
                        <span class="material-symbols-outlined text-2xl">directions_car</span>
                    </div>
                    <p class="text-[10px] font-medium leading-normal tracking-wide">RENTALS</p>
                </a>
                <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500"
                    href="index.html">
                    <div class="flex h-10 items-center justify-center">
                        <span class="material-symbols-outlined text-2xl">favorite</span>
                    </div>
                    <p class="text-[10px] font-medium leading-normal tracking-wide">SAVED</p>
                </a>
                <a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="signup.html">
                    <div class="flex h-10 items-center justify-center">
                        <span class="material-symbols-outlined text-2xl">person</span>
                    </div>
                    <p class="text-[10px] font-bold leading-normal tracking-wide">PROFILE</p>
                </a>
            </div>
        </nav>
    </div>
</body>

</html>
