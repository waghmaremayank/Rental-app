<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>Go Rental - Login</title>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Header -->
        <div
            class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-primary/10">
            <a href="index.html"
                class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg hover:bg-primary/10 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h2
                class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">
                Go Rental</h2>
        </div>
        <!-- Hero Image Container -->
        <div class="@container">
            <div class="@[480px]:px-4 @[480px]:py-4">
                <div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/20 @[480px]:rounded-xl min-h-[240px] shadow-sm"
                    data-alt="Modern rental car driving through a scenic road in Nagpur India"
                    data-location="Nagpur, IN"
                    style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDpRyfQNq6cAT_PI_ZTCuY80ad-hIL1h_vtTnik_BLyHcllPj1tOwppfd7LgiWU5yH2VDcxYHGfOBGwcUvQjh_mnkPGBHdxQqdKxjIKAsW5HnVNociwESvik5EjVjjXm1MPUeig9oiZX0c26wUUvt_ECVcNuUM3TpHhoR1ulQi7Ucq_1W1v4dCXYcJWPy74ZSCYCKJd7qrbArmxqNjmVtMfomwaZ7ZUmHGYbZBe1diSw13uAXreNQSMfbjObaXVZlTxMO3Rq9cmbQ");'>
                    <div class="bg-gradient-to-t from-black/60 to-transparent p-6">
                        <span
                            class="inline-block px-3 py-1 rounded-full bg-primary text-white text-xs font-semibold mb-2">Nagpur,
                            India</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- Welcome Text -->
        <div class="px-6 pt-8 pb-6">
            <h1 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold leading-tight text-center">Welcome
                back</h1>
            <p
                class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed pt-2 text-center max-w-xs mx-auto">
                Sign in to continue your rental journey in the Heart of India.
            </p>
        </div>
        <!-- Login Form -->
        <div class="px-6 space-y-4 max-w-md mx-auto w-full">
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5 ml-1">Email
                    Address</label>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
                    <input
                        class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-slate-100"
                        placeholder="name@example.com" type="email" />
                </div>
            </div>
            <div>
                <label
                    class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5 ml-1">Password</label>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
                    <input
                        class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-slate-100"
                        placeholder="••••••••" type="password" />
                </div>
                <div class="flex justify-end mt-2">
                    <a class="text-sm font-medium text-primary hover:underline" href="#">Forgot password?</a>
                </div>
            </div>
            <button onclick="localStorage.setItem('isLoggedIn', 'true'); window.location.href='index.html'"
                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-4">
                Sign In
            </button>
            <!-- Divider -->
            <div class="flex items-center gap-4 py-4">
                <div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-700"></div>
                <span class="text-slate-400 text-sm font-medium">or continue with</span>
                <div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-700"></div>
            </div>
            <!-- Social Logins -->
            <div class="grid grid-cols-2 gap-4">
                <button
                    class="flex items-center justify-center gap-2 py-3 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                    <img alt="Google" class="size-5" data-alt="Google logo icon"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBFE04BibPDMxWHkJPLA7n7iuNKCsNXFzlDMX-pzky1M0Ih-igtnGsirOWb9kkPWsZWwxEpmNjplGmBM3kKSh7qZfiLuExTujBlRdvZe1fV4r0tBHc84demeKeLR1pP0K_0_JKYhKs06h14s8fVZMl7MGMAd9-1dHcDd2JYdEI-DVpazKn08Mee1nU0Y2w2p8Wi8NldW45BwERzQqyMqLSECyQ4WogcM6CdlPe5bvwAwVLt2JJ0DZsM0vogHerDl4Au5DvEMnh4Dw" />
                    <span class="text-sm font-bold text-slate-700 dark:text-slate-300">Google</span>
                </button>
                <button
                    class="flex items-center justify-center gap-2 py-3 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                    <svg class="size-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z">
                        </path>
                    </svg>
                    <span class="text-sm font-bold text-slate-700 dark:text-slate-300">Facebook</span>
                </button>
            </div>
        </div>
        <!-- Footer Space -->
        <div class="flex-grow"></div>
        <div class="px-6 py-6 text-center">
            <p class="text-sm text-slate-500 dark:text-slate-400">
                Don't have an account? <a class="text-primary font-bold hover:underline" href="signup.html">Sign up</a>
            </p>
        </div>
        <!-- Navigation Bar -->
        <div
            class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-4 pb-6 pt-3 sticky bottom-0">
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500"
                href="index.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">home</span>
                </div>
                <p class="text-xs font-medium leading-normal">Home</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500"
                href="map.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">explore</span>
                </div>
                <p class="text-xs font-medium leading-normal">Explore</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="login.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">person</span>
                </div>
                <p class="text-xs font-bold leading-normal">Profile</p>
            </a>
        </div>
    </div>
</body>

</html>
